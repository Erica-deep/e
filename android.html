<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>英语听力挑战 - 听问句选答句</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #1a2a3a 0%, #0f1a24 100%);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* 游戏主容器 */
        .game-container {
            width: 100%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(2px);
            border-radius: 56px;
            padding: 20px 20px 32px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), inset 0 1px 1px rgba(255,255,255,0.1);
            transition: all 0.2s ease;
        }

        /* 进度区域 */
        .progress-area {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 20px;
            padding: 0 8px;
        }

        .badge {
            background: #ffd966;
            color: #2d3e50;
            font-weight: bold;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.85rem;
            box-shadow: inset 0 -1px 0 rgba(0,0,0,0.1);
        }

        .question-counter {
            background: #2c3e2f;
            color: #f5f5dc;
            padding: 6px 16px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        /* 音频卡片 (听问句区域) */
        .audio-card {
            background: #fef9e8;
            border-radius: 48px;
            padding: 30px 20px;
            text-align: center;
            margin-bottom: 32px;
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.2);
            transition: transform 0.1s ease;
        }

        .play-btn {
            background: #3b82f6;
            border: none;
            width: 90px;
            height: 90px;
            border-radius: 50%;
            font-size: 48px;
            cursor: pointer;
            box-shadow: 0 8px 14px rgba(0, 0, 0, 0.3);
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            background: radial-gradient(circle at 30% 20%, #4f9eff, #1e4a8a);
        }

        .play-btn:active {
            transform: scale(0.94);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .play-hint {
            margin-top: 14px;
            font-size: 0.85rem;
            color: #2c3e50;
            font-weight: 500;
            background: #e9ecef;
            display: inline-block;
            padding: 4px 18px;
            border-radius: 30px;
        }

        /* 选项区域 网格布局 */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin: 20px 0 24px;
        }

        .option-btn {
            background: #2d3e4b;
            border: none;
            padding: 16px 8px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 500;
            color: white;
            text-align: center;
            word-break: break-word;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 3px 6px rgba(0,0,0,0.2);
            backdrop-filter: blur(4px);
            font-family: inherit;
            line-height: 1.3;
        }

        .option-btn:active {
            transform: scale(0.96);
            background: #1e2f3a;
        }

        /* 错误/正确提示区域 */
        .message-area {
            text-align: center;
            margin: 12px 0 8px;
            font-weight: 600;
            font-size: 0.95rem;
            min-height: 50px;
        }

        .error-msg {
            color: #ffb347;
            background: #3a1f1f;
            display: inline-block;
            padding: 6px 20px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
        }

        .success-msg {
            color: #c6f7c6;
            background: #1e4a2f;
            display: inline-block;
            padding: 6px 20px;
            border-radius: 40px;
        }

        /* 重置按钮 */
        .reset-btn {
            background: #facc15;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1rem;
            color: #1e2a32;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            font-family: inherit;
            box-shadow: 0 2px 6px black;
        }

        .reset-btn:active {
            transform: scale(0.97);
        }

        /* 海报蒙层样式 */
        .poster-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        .poster-card {
            background: linear-gradient(135deg, #fff9e0, #ffe6b3);
            border-radius: 64px;
            padding: 28px 20px 32px;
            text-align: center;
            width: 90%;
            max-width: 380px;
            box-shadow: 0 30px 40px rgba(0,0,0,0.4);
            border: 3px solid gold;
        }

        .poster-card h2 {
            font-size: 2rem;
            margin: 12px 0;
            color: #c27e0a;
        }

        .poster-card p {
            font-size: 1.2rem;
            margin: 16px 0;
            color: #2c3e2f;
        }

        .poster-canvas {
            margin: 20px auto;
            width: 100%;
            border-radius: 32px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .poster-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        .poster-btn {
            background: #2c3e50;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .poster-btn.close {
            background: #e67e22;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 禁用选项样式 */
        .option-btn.disabled-opt {
            opacity: 0.6;
            pointer-events: none;
            transform: none;
        }

        /* 手机小屏优化 */
        @media (max-width: 480px) {
            .options-grid {
                gap: 12px;
            }
            .option-btn {
                padding: 12px 6px;
                font-size: 0.9rem;
            }
            .play-btn {
                width: 75px;
                height: 75px;
                font-size: 40px;
            }
            .audio-card {
                padding: 20px 12px;
            }
        }
    </style>
</head>
<body>

<div class="game-container" id="gameContainer">
    <div class="progress-area">
        <span class="badge">🎧 听力闯关</span>
        <span class="question-counter" id="questionCounter">第1 / 5题</span>
    </div>

    <div class="audio-card">
        <button class="play-btn" id="playAudioBtn">🔊</button>
        <div class="play-hint">🎙️ 点击喇叭 听问句</div>
        <!-- 绝不显示问句文本 -->
    </div>

    <div class="options-grid" id="optionsGrid">
        <!-- 动态渲染选项按钮 -->
    </div>

    <div class="message-area" id="messageArea"></div>
    
    <button class="reset-btn" id="resetGameBtn">🔄 重新挑战</button>
</div>

<script>
    // ---------- 题库 (问句 + 正确答句) ----------
    const QUESTIONS_DB = [
        { question: "It's cold.", correctAnswer: "Put on your coat." },
        { question: "Don't push.", correctAnswer: "Sorry." },
        { question: "Can you do sit-ups?", correctAnswer: "No. But I can try." },
        { question: "How many?", correctAnswer: "Ten. Try again." },
        { question: "What's this?", correctAnswer: "It's a lake." }
    ];

    // 所有答句库 (用于生成干扰项)
    const ALL_ANSWERS = QUESTIONS_DB.map(q => q.correctAnswer);
    
    // 游戏全局变量
    let currentIndex = 0;           // 当前第几题 (0~4)
    let gameCompleted = false;       // 是否已完成全部题目
    let waitingForNext = false;      // 防止正确后重复点击选项 (等待切换)
    let currentOptions = [];          // 当前题目的选项数组 (文本列表)
    let currentCorrectAnswer = "";    // 当前题目的正确答句
    
    // DOM 元素
    const playBtn = document.getElementById('playAudioBtn');
    const optionsGrid = document.getElementById('optionsGrid');
    const messageArea = document.getElementById('messageArea');
    const questionCounterSpan = document.getElementById('questionCounter');
    const resetBtn = document.getElementById('resetGameBtn');
    const gameContainer = document.getElementById('gameContainer');
    
    // ---------- 语音合成 (地道美式英语) ----------
    let speechSynth = window.speechSynthesis;
    let currentUtterance = null;
    
    // 停止当前任何正在播放的语音
    function stopSpeaking() {
        if (speechSynth && speechSynth.speaking) {
            speechSynth.cancel();
        }
        if (currentUtterance) {
            currentUtterance.onend = null;
            currentUtterance.onerror = null;
            currentUtterance = null;
        }
    }
    
    // 播放指定文本的音频 (使用TTS)
    function speakText(text) {
        return new Promise((resolve, reject) => {
            if (!speechSynth) {
                reject("不支持语音合成");
                return;
            }
            stopSpeaking(); // 停止之前的播放
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.92;      // 稍慢清晰
            utterance.pitch = 1.0;
            utterance.volume = 1;
            
            // 选择更地道的女声/男声 (优先 en-US 语音)
            if (speechSynth.getVoices) {
                // 异步获取语音列表, 但大多数现代浏览器直接可用, 设置延时尝试
                const voices = speechSynth.getVoices();
                const preferredVoice = voices.find(voice => voice.lang === 'en-US' && voice.name.includes('Samantha')) ||
                                       voices.find(voice => voice.lang === 'en-US' && voice.name.includes('Google')) ||
                                       voices.find(voice => voice.lang === 'en-US');
                if (preferredVoice) utterance.voice = preferredVoice;
            }
            
            utterance.onend = () => {
                currentUtterance = null;
                resolve();
            };
            utterance.onerror = (err) => {
                console.warn("语音错误", err);
                currentUtterance = null;
                reject(err);
            };
            currentUtterance = utterance;
            speechSynth.speak(utterance);
        });
    }
    
    // 播放当前题目的问句
    async function playCurrentQuestionAudio() {
        if (gameCompleted) {
            showMessage("🎉 游戏已通关！重新开始可继续挑战~", "info");
            return;
        }
        const questionText = QUESTIONS_DB[currentIndex].question;
        try {
            await speakText(questionText);
        } catch (e) {
            showMessage("⚠️ 语音播放失败，请检查网络或重试", "error");
        }
    }
    
    // 显示临时消息 (错误/正确)
    function showMessage(msg, type = "error") {
        messageArea.innerHTML = `<div class="${type === 'error' ? 'error-msg' : 'success-msg'}">${msg}</div>`;
        if (type === "success") {
            setTimeout(() => {
                if (messageArea.innerHTML.includes(msg)) {
                    messageArea.innerHTML = "";
                }
            }, 1500);
        } else {
            setTimeout(() => {
                if (messageArea.innerHTML.includes(msg)) messageArea.innerHTML = "";
            }, 1800);
        }
    }
    
    // 生成干扰项 (随机从其他答句抽取3个不同的，且不包含正确答句)
    function generateDistractors(correctAns, excludeIndex) {
        // 从所有答句中过滤掉正确的, 得到干扰候选池
        let candidates = ALL_ANSWERS.filter(ans => ans !== correctAns);
        // 随机取3个 (去重, 但原本就不同)
        let shuffled = [...candidates];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled.slice(0, 3);
    }
    
    // 生成当前题目的选项 (正确 + 3干扰项，并随机排序)
    function generateOptionsForCurrent() {
        const correct = QUESTIONS_DB[currentIndex].correctAnswer;
        const dists = generateDistractors(correct, currentIndex);
        let opts = [correct, ...dists];
        // Fisher-Yates 随机打乱顺序
        for (let i = opts.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [opts[i], opts[j]] = [opts[j], opts[i]];
        }
        return opts;
    }
    
    // 刷新UI: 渲染选项按钮, 更新计数器, 重置等待标志及消息
    function renderCurrentQuestion() {
        if (gameCompleted) return;
        
        // 更新进度文本
        questionCounterSpan.innerText = `第${currentIndex+1} / ${QUESTIONS_DB.length}题`;
        
        // 生成新选项
        currentOptions = generateOptionsForCurrent();
        currentCorrectAnswer = QUESTIONS_DB[currentIndex].correctAnswer;
        
        // 重新绘制选项按钮
        optionsGrid.innerHTML = '';
        currentOptions.forEach(optText => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = optText;
            btn.addEventListener('click', () => handleAnswer(optText));
            optionsGrid.appendChild(btn);
        });
        
        // 清除消息区域残留
        messageArea.innerHTML = '';
        waitingForNext = false;
        // 确保所有选项都可用（无禁用类）
        document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('disabled-opt'));
    }
    
    // 处理用户选择答案
    async function handleAnswer(selected) {
        // 游戏已完成或正在切换题目 禁止点击
        if (gameCompleted || waitingForNext) return;
        
        // 比较是否与当前正确答句匹配 (精确匹配, 已trim)
        if (selected === currentCorrectAnswer) {
            // 答对啦！
            showMessage("✅ 完美！答对了！进入下一题", "success");
            waitingForNext = true;   // 锁定按钮
            
            // 判断是否是最后一题
            const isLast = (currentIndex === QUESTIONS_DB.length - 1);
            if (isLast) {
                // 全部题目完成 → 生成通关海报
                gameCompleted = true;
                waitingForNext = false; // 完成海报不需要锁
                // 清理可能播放的语音
                stopSpeaking();
                // 生成并显示海报
                generateCompletionPoster();
                return;
            } else {
                // 不是最后一题，加载下一题
                currentIndex++;
                // 重新渲染新题目
                renderCurrentQuestion();
                // 自动播放新题目的问句？为了体验，可以选择自动播放提示；但为符合用户习惯，不自动播放，让用户点击喇叭
                // 但是给个小提示: 弹出小气泡提醒用户点击喇叭
                showMessage("🔊 点击上方喇叭，听新问句", "success");
            }
        } else {
            // 答错: 重新选择 (不清除选项，只提示错误)
            showMessage("❌ 答错了，再听一遍问句并重新选择吧", "error");
            // 轻微震动提醒 (可选)
            const errorMsgDiv = document.querySelector('.error-msg');
            if (errorMsgDiv) {
                errorMsgDiv.style.transform = 'scale(1.02)';
                setTimeout(() => { if(errorMsgDiv) errorMsgDiv.style.transform = ''; }, 200);
            }
            // 答错不清空界面，用户可继续点击其他选项
            // 同时为用户便利，我们可以高亮播放按钮提示，但不自动播放
        }
    }
    
    // ----- 通关海报生成 (Canvas 高质量) -----
    function generateCompletionPoster() {
        // 创建一个 canvas 生成海报图片
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const width = 500;
        const height = 700;
        canvas.width = width;
        canvas.height = height;
        
        // 背景渐变 (荣耀金+暖色)
        const grad = ctx.createLinearGradient(0, 0, width, height);
        grad.addColorStop(0, '#FFE6B0');
        grad.addColorStop(1, '#FFB347');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, width, height);
        
        // 装饰边框
        ctx.strokeStyle = '#d4af37';
        ctx.lineWidth = 12;
        ctx.strokeRect(15, 15, width - 30, height - 30);
        
        // 大标题
        ctx.font = 'bold 38px "Segoe UI", "PingFang SC", system-ui';
        ctx.fillStyle = '#2c3e2f';
        ctx.shadowBlur = 0;
        ctx.fillText("🏆 听力大师", width/2 - 130, 100);
        
        ctx.font = '24px system-ui';
        ctx.fillStyle = '#ad7a2c';
        ctx.fillText("通关证书", width/2 - 72, 170);
        
        // 装饰星星
        ctx.font = '36px sans-serif';
        ctx.fillStyle = '#F4C542';
        ctx.fillText("⭐⭐⭐", width/2 - 55, 230);
        
        // 用户完成信息
        ctx.font = 'bold 22px system-ui';
        ctx.fillStyle = '#2d4a22';
        ctx.fillText("完美答对所有题目", width/2 - 130, 310);
        
        // 列出完成的5个问句(不显示文本？为了海报纪念，展示成就摘要)
        ctx.font = '18px "Segoe UI"';
        ctx.fillStyle = '#3a2a1f';
        let yPos = 380;
        QUESTIONS_DB.forEach((item, idx) => {
            // 展示问句缩写及✔️
            let qShort = item.question.length > 20 ? item.question.slice(0,18)+"..." : item.question;
            ctx.fillText(`${idx+1}. 🎧 ${qShort}  ✔️`, 50, yPos);
            yPos += 38;
        });
        
        // 日期 + 鼓励语
        const today = new Date().toLocaleDateString('zh-CN', {year:'numeric', month:'long', day:'numeric'});
        ctx.font = '16px system-ui';
        ctx.fillStyle = '#5a3e1b';
        ctx.fillText(`颁发日期: ${today}`, width/2 - 100, yPos + 20);
        ctx.font = 'italic 18px system-ui';
        ctx.fillStyle = '#c2620f';
        ctx.fillText("Keep listening & keep shining!", width/2 - 135, yPos + 70);
        
        // 绘制可爱耳朵装饰
        ctx.fillStyle = "#FBC4AB";
        ctx.beginPath();
        ctx.arc(80, 620, 22, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = "#D98C5F";
        ctx.beginPath();
        ctx.arc(80, 620, 12, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = "#FBC4AB";
        ctx.beginPath();
        ctx.arc(width-80, 620, 22, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = "#D98C5F";
        ctx.beginPath();
        ctx.arc(width-80, 620, 12, 0, Math.PI*2);
        ctx.fill();
        
        // 转为图片数据
        const posterImageURL = canvas.toDataURL('image/png');
        
        // 创建海报浮层
        const overlay = document.createElement('div');
        overlay.className = 'poster-overlay';
        overlay.innerHTML = `
            <div class="poster-card">
                <h2>🎉 闯关成功 🎉</h2>
                <p>听力小天才！全部答对！</p>
                <img class="poster-canvas" src="${posterImageURL}" alt="通关海报" style="width:100%; max-width:320px; border-radius:28px;">
                <div class="poster-actions">
                    <button class="poster-btn" id="savePosterBtn">💾 保存海报</button>
                    <button class="poster-btn close" id="closePosterBtn">✨ 新的一轮</button>
                </div>
            </div>
        `;
        document.body.appendChild(overlay);
        
        // 保存海报功能
        const saveBtn = document.getElementById('savePosterBtn');
        const closeBtn = document.getElementById('closePosterBtn');
        
        if (saveBtn) {
            saveBtn.addEventListener('click', () => {
                // 创建临时链接下载
                const link = document.createElement('a');
                link.download = `listening_champion.png`;
                link.href = posterImageURL;
                link.click();
                // 移动端可以长按保存，提示
                showMessageOnPoster("✅ 海报已保存到相册/下载文件夹", overlay);
            });
        }
        
        if (closeBtn) {
            closeBtn.addEventListener('click', () => {
                overlay.remove();
                // 重置整个游戏（新的一轮）
                resetGameFully();
            });
        }
        
        // 阻止背景滚动
        document.body.style.overflow = 'hidden';
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) {
                overlay.remove();
                resetGameFully();
                document.body.style.overflow = '';
            }
        });
    }
    
    function showMessageOnPoster(msg, overlayElem) {
        const toast = document.createElement('div');
        toast.innerText = msg;
        toast.style.position = 'absolute';
        toast.style.bottom = '100px';
        toast.style.left = '20%';
        toast.style.background = '#2e7d32';
        toast.style.color = 'white';
        toast.style.padding = '8px 18px';
        toast.style.borderRadius = '30px';
        toast.style.fontWeight = 'bold';
        toast.style.zIndex = '1100';
        overlayElem.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
    
    // 完全重置游戏状态 (保留初始数据)
    function resetGameFully() {
        // 重置全局变量
        gameCompleted = false;
        currentIndex = 0;
        waitingForNext = false;
        // 停止语音
        stopSpeaking();
        // 重新渲染第一题
        renderCurrentQuestion();
        // 清空任何额外海报残留
        const existingOverlay = document.querySelector('.poster-overlay');
        if (existingOverlay) existingOverlay.remove();
        document.body.style.overflow = '';
        // 额外清除消息
        messageArea.innerHTML = '';
        showMessage("🔄 游戏已重置，从第1题开始！点击喇叭听问句", "success");
    }
    
    // 监听语音列表就绪，优化语音体验 (避免首次语音延迟)
    if (speechSynth) {
        // 预加载语音
        speechSynth.getVoices();
    }
    
    // 播放按钮事件
    playBtn.addEventListener('click', (e) => {
        e.preventDefault();
        if (gameCompleted) {
            showMessage("游戏已通关，点击「重新挑战」可继续游戏", "error");
            return;
        }
        playCurrentQuestionAudio();
    });
    
    // 重置按钮
    resetBtn.addEventListener('click', () => {
        if (gameCompleted) {
            resetGameFully();
        } else {
            // 未完成时重置需要确认? 直接重置，友好
            resetGameFully();
        }
    });
    
    // 初始化渲染第一题
    function initGame() {
        gameCompleted = false;
        currentIndex = 0;
        waitingForNext = false;
        renderCurrentQuestion();
        // 小提示
        setTimeout(() => {
            showMessage("🎧 点击喇叭听问句，然后选择答句！", "success");
        }, 200);
    }
    
    initGame();
    
    // 附加: 针对移动端触摸优化，防止300ms延迟 (现代浏览器已优化)
    // 并且处理页面可见时避免语音合成堆积
    window.addEventListener('beforeunload', () => {
        if (speechSynth) speechSynth.cancel();
    });
</script>
</body>
</html>
