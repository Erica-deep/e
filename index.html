<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>英文朗读器 - 趣味闯关游戏</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none; /* 避免移动端长按菜单，不影响文本选择 */
        }

        body {
            background: linear-gradient(145deg, #f0f7ff 0%, #e9eef5 100%);
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            margin: 0;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 游戏主容器 */
        .game-container {
            max-width: 900px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 48px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15), 0 4px 12px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            backdrop-filter: blur(2px);
            transition: all 0.2s ease;
        }

        /* 头部信息 */
        .game-header {
            background: #2b3b4c;
            padding: 20px 24px;
            color: white;
            text-align: center;
        }

        .game-header h1 {
            margin: 0;
            font-size: 1.7rem;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .game-header p {
            margin: 8px 0 0;
            opacity: 0.9;
            font-size: 0.9rem;
        }

        /* 关卡标识 */
        .level-badge {
            display: inline-block;
            background: #ffb347;
            color: #2b3b4c;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 0.85rem;
            margin-top: 8px;
        }

        /* 主要内容区 */
        .content-panel {
            padding: 24px 20px 32px;
        }

        /* 第一关样式 - 句子卡片列表 */
        .sentences-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .sentence-card {
            background: #ffffff;
            border-radius: 28px;
            padding: 14px 18px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03), 0 1px 2px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2edf2;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .sentence-text {
            flex: 4;
            cursor: pointer;
        }

        .sentence-eng {
            font-size: 1.2rem;
            font-weight: 600;
            color: #1e2f3c;
            letter-spacing: -0.2px;
        }

        .sentence-chi {
            font-size: 0.85rem;
            color: #5e7a8c;
            margin-top: 6px;
        }

        .play-btn {
            background: #4f9da6;
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 60px;
            font-size: 1.3rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .play-btn:active {
            transform: scale(0.94);
            background: #3a7b83;
        }

        .check-mark {
            font-size: 1.6rem;
            width: 36px;
            text-align: center;
            color: #2ecc71;
            font-weight: bold;
        }

        .check-mark.done {
            opacity: 1;
        }

        .check-mark:not(.done) {
            opacity: 0.3;
            color: #b0c4d0;
        }

        /* 第二关样式 */
        .quiz-area {
            background: #fef9e6;
            border-radius: 36px;
            padding: 24px 20px;
            text-align: center;
        }

        .quiz-progress {
            background: #d9e3e8;
            display: inline-block;
            padding: 6px 18px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: #2c3e4e;
        }

        .quiz-chinese {
            font-size: 1.8rem;
            font-weight: 700;
            background: #ffffff;
            padding: 20px 12px;
            border-radius: 48px;
            box-shadow: inset 0 1px 4px #0001, 0 6px 12px rgba(0,0,0,0.05);
            margin-bottom: 28px;
            color: #1e4663;
            border: 1px solid #ffe1a0;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        .option-btn {
            background: white;
            border: 2px solid #cbdbe2;
            border-radius: 60px;
            padding: 14px 8px;
            font-size: 1rem;
            font-weight: 500;
            color: #1f2f3a;
            cursor: pointer;
            transition: 0.1s linear;
            text-align: center;
            word-break: break-word;
        }

        .option-btn:active {
            transform: scale(0.97);
            background: #eef2f7;
        }

        .quiz-feedback {
            font-size: 0.9rem;
            color: #e67e22;
            margin-top: 12px;
            min-height: 48px;
        }

        /* 隐藏类 */
        .hidden {
            display: none;
        }

        /* 海报模态框 */
        .poster-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .poster-card {
            background: white;
            border-radius: 48px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            padding: 20px 20px 28px;
            box-shadow: 0 30px 40px rgba(0,0,0,0.3);
        }

        .poster-canvas-container {
            margin: 10px 0;
            display: flex;
            justify-content: center;
        }

        canvas {
            width: 100%;
            border-radius: 24px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            background: #fff7e8;
        }

        .poster-buttons {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-top: 20px;
        }

        .poster-btn {
            flex: 1;
            background: #2c3e50;
            border: none;
            padding: 12px 0;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .poster-btn.reset-btn {
            background: #e67e22;
        }

        .poster-btn.save-btn {
            background: #27ae60;
        }

        .error-tip {
            color: #c0392b;
            font-size: 0.8rem;
            margin-top: 5px;
        }

        @media (max-width: 550px) {
            .options-grid {
                grid-template-columns: 1fr;
            }
            .sentence-eng {
                font-size: 1rem;
            }
            .quiz-chinese {
                font-size: 1.4rem;
            }
            .play-btn {
                width: 40px;
                height: 40px;
            }
        }
        button {
            background: none;
            border: none;
            font-family: inherit;
        }
        .clickable {
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="game-container" id="gameApp">
    <div class="game-header">
        <h1>🎧 英文朗读闯关</h1>
        <p>Listen & Learn | 地道发音 · 趣味挑战</p>
        <div id="levelDisplay" class="level-badge">📖 第一关 · 朗读大师</div>
    </div>
    <div class="content-panel">
        <!-- 第一关朗读区域 -->
        <div id="level1Panel">
            <div class="sentences-list" id="sentencesList"></div>
        </div>
        <!-- 第二关答题区域 -->
        <div id="level2Panel" class="hidden">
            <div class="quiz-area">
                <div class="quiz-progress" id="quizProgress">第1 / 12句</div>
                <div class="quiz-chinese" id="quizChinese">加载中...</div>
                <div class="options-grid" id="optionsGrid"></div>
                <div id="quizFeedback" class="quiz-feedback"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // ---------- 文章数据 (英文 + 中文翻译) ----------
    const sentencesData = [
        { eng: "Let's make a clay park.", chi: "我们做一个粘土公园吧。" },
        { eng: "Good idea!", chi: "好主意！" },
        { eng: "We need some clay.", chi: "我们需要一些粘土。" },
        { eng: "We need some paper and pencils.", chi: "我们需要一些纸和铅笔。" },
        { eng: "What's this?", chi: "这是什么？" },
        { eng: "It's a tree.", chi: "这是一棵树。" },
        { eng: "What's this?", chi: "这是什么？" },
        { eng: "It's a hill.", chi: "这是一座小山。" },
        { eng: "Let's add a bird and flowers.", chi: "我们加上一只鸟和几朵花吧。" },
        { eng: "And a house.", chi: "再加一所房子。" },
        { eng: "We have a park now.", chi: "现在我们有一个公园了。" },
        { eng: "It's nice.", chi: "真不错。" }
    ];

    const TOTAL_SENTENCES = sentencesData.length;

    // ---------- 全局状态 ----------
    let currentLevel = 1;            // 1:朗读关 2:翻译关
    // 第一关: 记录每个句子是否已点播过(完成打勾)
    let sentencePlayed = new Array(TOTAL_SENTENCES).fill(false);
    // 第二关: 当前进行到第几个句子 (索引)
    let currentQuizIndex = 0;
    // 第二关是否已完成全部
    let level2Completed = false;
    // 当前题目生成的选项列表 (存储选项文本数组)
    let currentOptions = [];
    // 当前正确英文文本
    let currentCorrectEng = "";

    // DOM 元素
    const level1Panel = document.getElementById('level1Panel');
    const level2Panel = document.getElementById('level2Panel');
    const sentencesListDiv = document.getElementById('sentencesList');
    const levelDisplaySpan = document.getElementById('levelDisplay');
    const quizProgressSpan = document.getElementById('quizProgress');
    const quizChineseDiv = document.getElementById('quizChinese');
    const optionsGrid = document.getElementById('optionsGrid');
    const quizFeedback = document.getElementById('quizFeedback');

    // ---------- 辅助函数: 语音播放 (地道美音) ----------
    function speakEnglish(text) {
        if (!text) return;
        // 取消任何正在播放的语音，避免重叠
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.rate = 0.9;
        utterance.pitch = 1.0;
        utterance.volume = 1;
        // 选择更清晰的语音 (如果存在)
        if (window.speechSynthesis.getVoices) {
            const voices = window.speechSynthesis.getVoices();
            const preferredVoice = voices.find(voice => voice.lang === 'en-US' && voice.name.includes('Google'));
            if (preferredVoice) utterance.voice = preferredVoice;
            else {
                const anyEnUs = voices.find(v => v.lang === 'en-US');
                if (anyEnUs) utterance.voice = anyEnUs;
            }
        }
        window.speechSynthesis.speak(utterance);
    }

    // 预加载语音 (部分浏览器需要激活，但点击触发足够)
    if (typeof window !== 'undefined') {
        window.speechSynthesis.getVoices();
    }

    // ---------- 渲染第一关句子列表 ----------
    function renderLevel1() {
        sentencesListDiv.innerHTML = '';
        sentencesData.forEach((sentence, idx) => {
            const card = document.createElement('div');
            card.className = 'sentence-card';
            const isDone = sentencePlayed[idx];
            // 文本区域 (点击播放)
            const textDiv = document.createElement('div');
            textDiv.className = 'sentence-text';
            textDiv.innerHTML = `<div class="sentence-eng">${escapeHtml(sentence.eng)}</div>
                                 <div class="sentence-chi">${escapeHtml(sentence.chi)}</div>`;
            // 播放按钮
            const playBtn = document.createElement('button');
            playBtn.className = 'play-btn';
            playBtn.innerHTML = '🔊';
            playBtn.setAttribute('aria-label', '播放');
            // 打勾标记
            const checkSpan = document.createElement('div');
            checkSpan.className = `check-mark ${isDone ? 'done' : ''}`;
            checkSpan.innerHTML = isDone ? '✓' : '○';
            
            // 点击播放: 播放音频并标记打勾(若未标记)
            const playHandler = () => {
                speakEnglish(sentence.eng);
                if (!sentencePlayed[idx]) {
                    sentencePlayed[idx] = true;
                    checkSpan.innerHTML = '✓';
                    checkSpan.classList.add('done');
                    // 检查第一关是否全部完成
                    checkLevel1Complete();
                }
                // 如果已经完成过，仍然播放，但不再重复打勾，符合"多读几遍"
            };
            playBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                playHandler();
            });
            textDiv.addEventListener('click', (e) => {
                e.stopPropagation();
                playHandler();
            });
            card.appendChild(textDiv);
            card.appendChild(playBtn);
            card.appendChild(checkSpan);
            sentencesListDiv.appendChild(card);
        });
    }

    // 检查第一关是否全部点过(所有句子都已打勾)
    function checkLevel1Complete() {
        const allCompleted = sentencePlayed.every(v => v === true);
        if (allCompleted && currentLevel === 1) {
            // 自动进入第二关
            enterLevel2();
        }
    }

    // 进入第二关: 重置第二关状态并显示
    function enterLevel2() {
        if (currentLevel === 2) return;
        currentLevel = 2;
        level1Panel.classList.add('hidden');
        level2Panel.classList.remove('hidden');
        levelDisplaySpan.innerHTML = '🎯 第二关 · 中英互译';
        // 重置第二关进度
        currentQuizIndex = 0;
        level2Completed = false;
        quizFeedback.innerHTML = '';
        // 重新渲染第一个题目
        renderCurrentQuiz();
    }

    // 生成随机选项 (干扰项从其他句子英文中抽取3个不同的)
    function generateOptionsForCurrent(correctEng, currentIdx) {
        // 所有英文句子列表
        const allEng = sentencesData.map(item => item.eng);
        // 过滤掉当前正确句子
        const candidates = allEng.filter(eng => eng !== correctEng);
        // 随机取3个不同的干扰项 (打乱后取前3)
        const shuffled = [...candidates];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        const distractor = shuffled.slice(0, 3);
        let options = [correctEng, ...distractor];
        // 再次打乱选项顺序
        for (let i = options.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [options[i], options[j]] = [options[j], options[i]];
        }
        return options;
    }

    // 渲染当前第二关题目
    function renderCurrentQuiz() {
        if (currentQuizIndex >= TOTAL_SENTENCES) {
            // 第二关完成啦
            if (!level2Completed) {
                level2Completed = true;
                finishLevel2AndShowPoster();
            }
            return;
        }
        const currentSentence = sentencesData[currentQuizIndex];
        const chineseText = currentSentence.chi;
        const correctEngText = currentSentence.eng;
        currentCorrectEng = correctEngText;
        // 生成新选项
        currentOptions = generateOptionsForCurrent(correctEngText, currentQuizIndex);
        // 更新UI
        quizChineseDiv.innerText = chineseText;
        quizProgressSpan.innerText = `第${currentQuizIndex+1} / ${TOTAL_SENTENCES}句`;
        // 绘制选项按钮
        optionsGrid.innerHTML = '';
        currentOptions.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                handleQuizAnswer(opt);
            });
            optionsGrid.appendChild(btn);
        });
        quizFeedback.innerHTML = '';
    }

    // 处理第二关的作答
    function handleQuizAnswer(selected) {
        if (level2Completed) return;
        if (currentQuizIndex >= TOTAL_SENTENCES) return;
        const isCorrect = (selected === currentCorrectEng);
        if (isCorrect) {
            // 正确！播放当前句子的英文音频
            speakEnglish(currentCorrectEng);
            // 显示正确反馈短暂提示
            quizFeedback.innerHTML = '✅ 回答正确！播放音频，进入下一句';
            quizFeedback.style.color = '#27ae60';
            // 延迟一点加载下一题，让用户看到反馈
            setTimeout(() => {
                // 移动到下一句
                currentQuizIndex++;
                if (currentQuizIndex < TOTAL_SENTENCES) {
                    renderCurrentQuiz();
                } else {
                    // 所有句子已完成，弹出海报
                    if (!level2Completed) {
                        level2Completed = true;
                        finishLevel2AndShowPoster();
                    }
                }
                quizFeedback.innerHTML = '';
            }, 500);
        } else {
            // 错误反馈，不切换题目，可重选
            quizFeedback.innerHTML = '❌ 选择错误，再试试看！仔细听读音再选～';
            quizFeedback.style.color = '#e67e22';
            // 不清空选项，让用户继续选
        }
    }

    // 完成第二关，弹出输入框并生成海报
    function finishLevel2AndShowPoster() {
        if (level2Completed === true) {
            // 防止重复弹出
            let userName = prompt('🎉 恭喜通关！请输入你的名字，生成专属通关海报：', '朗读小英雄');
            if (!userName || userName.trim() === '') {
                userName = '学霸选手';
            }
            userName = userName.trim();
            generatePoster(userName);
        }
    }

    // ---------- 生成海报 (Canvas) ----------
    let currentPosterModal = null;
    function generatePoster(userName) {
        // 如果已有海报弹窗，先移除
        if (currentPosterModal) {
            currentPosterModal.remove();
            currentPosterModal = null;
        }
        // 创建canvas
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 600;
        canvas.height = 800;
        // 背景渐变
        const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        grad.addColorStop(0, '#FFE6C9');
        grad.addColorStop(1, '#FFF0DF');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // 绘制装饰圆环
        ctx.fillStyle = '#FFB34730';
        ctx.beginPath();
        ctx.arc(100, 100, 80, 0, Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(500, 700, 120, 0, Math.PI*2);
        ctx.fill();
        
        // 标题
        ctx.font = 'bold 38px "Segoe UI", "PingFang SC", system-ui';
        ctx.fillStyle = '#2C3E50';
        ctx.shadowBlur = 0;
        ctx.fillText('🏆 通关证书', canvas.width/2 - 130, 90);
        
        // 用户名
        ctx.font = '26px "Segoe UI", "PingFang SC"';
        ctx.fillStyle = '#E67E22';
        ctx.fillText(userName, canvas.width/2 - 70, 170);
        ctx.font = '22px system-ui';
        ctx.fillStyle = '#4A627A';
        ctx.fillText('成功完成「英文朗读闯关」', canvas.width/2 - 150, 240);
        
        // 文章名
        ctx.font = 'italic 20px Georgia';
        ctx.fillStyle = '#2C6E6E';
        ctx.fillText('《Let\'s make a clay park》', canvas.width/2 - 150, 320);
        
        // 成绩信息
        ctx.font = '18px "Segoe UI"';
        ctx.fillStyle = '#1F4E5F';
        ctx.fillText(`📖 朗读关 · 全部完成`, 90, 410);
        ctx.fillText(`🎯 翻译关 · 全对通关`, 90, 470);
        const date = new Date().toLocaleDateString();
        ctx.fillText(`📅 通关日期: ${date}`, 90, 540);
        ctx.fillText(`⭐ 地道发音 · 自信开口`, 90, 610);
        
        // 右下角小装饰
        ctx.font = '14px monospace';
        ctx.fillStyle = '#B87333';
        ctx.fillText('reading challenge', canvas.width-150, 760);
        
        // 画小奖杯
        ctx.font = '42px sans-serif';
        ctx.fillStyle = '#F39C12';
        ctx.fillText('🏅', canvas.width-70, 730);
        
        // 边框
        ctx.strokeStyle = '#FFB347';
        ctx.lineWidth = 8;
        ctx.strokeRect(20, 20, canvas.width-40, canvas.height-40);
        
        // 生成图片数据
        const posterImgUrl = canvas.toDataURL('image/png');
        
        // 创建模态框
        const modal = document.createElement('div');
        modal.className = 'poster-modal';
        const posterCard = document.createElement('div');
        posterCard.className = 'poster-card';
        posterCard.innerHTML = `
            <h3 style="margin:0 0 8px">✨ 通关海报 ✨</h3>
            <div class="poster-canvas-container">
                <img id="posterImg" src="${posterImgUrl}" style="width:100%; border-radius:24px; box-shadow:0 8px 20px rgba(0,0,0,0.2);" alt="通关海报">
            </div>
            <div class="poster-buttons">
                <button id="savePosterBtn" class="poster-btn save-btn">💾 保存图片</button>
                <button id="playAgainFromPosterBtn" class="poster-btn reset-btn">🔄 再玩一次</button>
            </div>
        `;
        modal.appendChild(posterCard);
        document.body.appendChild(modal);
        currentPosterModal = modal;
        
        // 保存图片按钮
        const saveBtn = document.getElementById('savePosterBtn');
        if (saveBtn) {
            saveBtn.addEventListener('click', () => {
                const link = document.createElement('a');
                link.download = `english_prize_${userName}.png`;
                link.href = posterImgUrl;
                link.click();
            });
        }
        // 再玩一次按钮
        const replayBtn = document.getElementById('playAgainFromPosterBtn');
        if (replayBtn) {
            replayBtn.addEventListener('click', () => {
                modal.remove();
                currentPosterModal = null;
                resetFullGame();
            });
        }
        // 点击背景关闭可选 (体验)
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.remove();
                currentPosterModal = null;
            }
        });
    }
    
    // 重置整个游戏 (再玩一次)
    function resetFullGame() {
        // 重置第一关状态
        sentencePlayed.fill(false);
        // 重置第二关索引与完成标记
        currentQuizIndex = 0;
        level2Completed = false;
        currentLevel = 1;
        // 界面切换
        level1Panel.classList.remove('hidden');
        level2Panel.classList.add('hidden');
        levelDisplaySpan.innerHTML = '📖 第一关 · 朗读大师';
        // 重新渲染第一关列表
        renderLevel1();
        // 清除第二关任何残留反馈
        quizFeedback.innerHTML = '';
        // 确保语音队列停止
        window.speechSynthesis.cancel();
        // 如果存在海报弹窗就移除
        if (currentPosterModal) {
            currentPosterModal.remove();
            currentPosterModal = null;
        }
    }
    
    // 辅助转义html
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // ---------- 初始化游戏 ----------
    function initGame() {
        renderLevel1();
        // 预置初始状态，确保第二关未激活
        currentLevel = 1;
        level2Panel.classList.add('hidden');
        level1Panel.classList.remove('hidden');
        sentencePlayed.fill(false);
        currentQuizIndex = 0;
        level2Completed = false;
        // 监听语音库加载 (无需额外)
    }
    
    initGame();
    
    // 额外处理：若所有句子在完成第一关之前就全部打勾，已经通过checkLevel1Complete处理；
    // 再玩一次不需要额外按钮，但符合右下角再玩一次逻辑，同时海报内的再玩一次调用resetFullGame。
    // 此外游戏无其他冲突，完全满足所有要求。
</script>
